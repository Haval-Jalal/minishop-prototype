<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Components - MiniShop</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <nav class="nav">
        <h1>MiniShop Components</h1>
    </nav>
</header>

<main>

    <section>
        <h2>Card Component</h2>
        <article class="card">
            <h3>Sample Product</h3>
            <p>Example description text inside a reusable card.</p>
            <a class="btn" href="#">View</a>
        </article>
    </section>

    <section>
        <h2>Button Component</h2>
        <a class="btn" href="#">Primary Button</a>
    </section>

    <section>
        <h2>Cart Indicator</h2>
        <div class="cart-indicator">
            Cart: <span>2</span>
        </div>
    </section>

</main>

<footer>
    <p>MiniShop Prototype © 2026</p>
</footer>

</body>
</html>
